<div class="bg-slate-100 h-full flex flex-col items-center justify-center">
  <div
    class="w-[20rem] bg-white border-[1px] border-solid border-gray-300 p-3 rounded-md"
  >
    <h1 class="text-center text-3xl font-semibold text-green-600 pt-5">
      Gestor
    </h1>
    <div>
      <div class="p-4">
        <div class="text-center mb-5">
          <h5>Criar nova conta</h5>
          <p class="text-sm">Crie sua conta no Gestor gratuitamente</p>
        </div>
        <div>
          <form
            [formGroup]="signupForm"
            (ngSubmit)="onSubmit()"
            class="text-sm"
          >
            <div>
              <div class="flex flex-col">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  formControlName="email"
                  placeholder="Informe seu email"
                  class="inputs"
                />
              </div>
              <div class="h-5 flex items-center">
                <p class="text-xs text-red-500" *ngIf="isValidFormSubmitted">
                  Campo obrigatório
                </p>
              </div>
            </div>
            <div>
              <div class="flex flex-col">
                <label for="username">Username</label>
                <input
                  type="text"
                  id="username"
                  formControlName="username"
                  placeholder="Escolha um username"
                  class="inputs"
                />
              </div>
              <div class="h-5 flex items-center">
                <p class="text-xs text-red-500" *ngIf="isValidFormSubmitted">
                  Campo obrigatório
                </p>
              </div>
            </div>
            <div>
              <div class="flex flex-col">
                <label for="password">Password</label>
                <input
                  type="password"
                  id="password"
                  formControlName="password"
                  placeholder="Digite uma senha"
                  class="inputs"
                />
              </div>
              <div class="h-5 flex items-center">
                <p class="text-xs text-red-500" *ngIf="isValidFormSubmitted">
                  Campo obrigatório
                </p>
              </div>
            </div>
            <button
              type="submit"
              class="w-full bg-green-700 text-white py-2 rounded-md"
            >
              Criar conta
            </button>
          </form>
        </div>
      </div>
    </div>
    <div class="flex items-center justify-center" *ngIf="loading">
      <div class="loader"></div>
    </div>
    <div>
      <div class="mt-4 text-center">
        <p>
          Ja possui uma conta?
          <a routerLink="/auth/login" class="text-blue-500 underline">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
