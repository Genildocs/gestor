<div class="my-4 p-3 rounded-lg border-[1px] border-solid border-gray-300">
  <div class="mb-6">
    <div
      class="border-[1px] border-solid border-gray-300 rounded-lg flex items-center gap-5 p-2"
    >
      <div
        class="flex items-center gap-2 bg-green-600 hover:bg-green-700 px-2 py-1 rounded-md text-white"
      >
        <i class="pi pi-plus" style="font-size: 0.8rem"></i>
        <button class="text-sm" (click)="showModal()">New</button>
      </div>
      <div
        class="flex items-center gap-2 bg-red-400 px-2 py-1 rounded-md text-white"
      >
        <i class="pi pi-trash" style="font-size: 0.8rem"></i>
        <button class="text-sm">Delete</button>
      </div>
    </div>
  </div>
  <div>
    <app-modal-adicionar></app-modal-adicionar>
  </div>
</div>
